name: Build Simulator

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-simulator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libcurl4-openssl-dev

      - name: Fetch Lua
        run: |
          mkdir -p third_party/lua-5.4
          curl -fL https://www.lua.org/ftp/lua-5.4.7.tar.gz \
            | tar -xz --strip-components=1 -C third_party/lua-5.4/

      - name: Cache simulator build
        uses: actions/cache@v4
        with:
          path: build_sim
          key: ${{ runner.os }}-simulator-${{ hashFiles('simulator/**/*.c', 'simulator/**/*.h', 'src/**/*.c', 'src/**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-simulator-

      - name: Build simulator
        run: make simulator

      - name: Upload simulator binary
        uses: actions/upload-artifact@v4
        with:
          name: picos-simulator-linux
          path: build_sim/picos_simulator
          retention-days: 7
